name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package manager
        id: pm
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "lockfile=package-lock.json" >> "$GITHUB_OUTPUT"
            echo "install_cmd=npm ci" >> "$GITHUB_OUTPUT"
            echo "script_cmd=npm run" >> "$GITHUB_OUTPUT"
          elif [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "lockfile=pnpm-lock.yaml" >> "$GITHUB_OUTPUT"
            echo "install_cmd=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "script_cmd=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "lockfile=yarn.lock" >> "$GITHUB_OUTPUT"
            echo "install_cmd=yarn install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "script_cmd=yarn" >> "$GITHUB_OUTPUT"
          else
            echo "No supported lockfile found." >&2
            exit 1
          fi

      - name: Resolve Node version
        id: node
        shell: bash
        run: |
          if [ -f .nvmrc ]; then
            version="$(tr -d '[:space:]' < .nvmrc)"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -f package.json ]; then
            version="$(node -e "const pkg=require('./package.json');process.stdout.write(pkg.engines?.node || '')")"
            if [ -n "$version" ]; then
              echo "version=$version" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "version=20" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: ${{ steps.pm.outputs.manager }}
          cache-dependency-path: ${{ steps.pm.outputs.lockfile }}

      - name: Setup pnpm
        if: steps.pm.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: ${{ steps.pm.outputs.install_cmd }}

      - name: Lint
        run: ${{ steps.pm.outputs.script_cmd }} lint

      - name: Format Check
        run: ${{ steps.pm.outputs.script_cmd }} format:check

      - name: Test
        run: ${{ steps.pm.outputs.script_cmd }} test

      - name: Build
        run: ${{ steps.pm.outputs.script_cmd }} build
