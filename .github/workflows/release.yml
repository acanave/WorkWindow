name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to release (tag or commit)
        required: true
        default: main
        type: string
      tag:
        description: 'Version tag to create on manual release (example: v0.2.0)'
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout tag/ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref || inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate release build
        run: |
          npm run lint
          npm run format:check
          npm test
          npm run build

      - name: Package release artifact
        shell: bash
        run: |
          TAR_NAME="workwindow-dist-${GITHUB_SHA}.tar.gz"
          tar -czf "$TAR_NAME" dist
          sha256sum "$TAR_NAME" > "${TAR_NAME}.sha256"
          echo "TAR_NAME=$TAR_NAME" >> "$GITHUB_ENV"

      - name: Prepare tag name
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          fi

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git tag "${{ env.RELEASE_TAG }}" "${GITHUB_SHA}"
          git push origin "${{ env.RELEASE_TAG }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            ${{ env.TAR_NAME }}
            ${{ env.TAR_NAME }}.sha256
